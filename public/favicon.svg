<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0E0E11"/>

  <!-- Subtle orange nebula glow -->
  <circle cx="19" cy="13" r="9" fill="#FF8A1F" fill-opacity="0.06"/>

  <!-- Saturn ring — back half (behind planet) -->
  <path d="M 4.5 16 A 11.5 4.2 0 0 1 27.5 16"
    stroke="#FF8A1F" stroke-width="1.4" fill="none"
    stroke-linecap="round" opacity="0.32"/>

  <!-- Planet body -->
  <circle cx="16" cy="16" r="6.8" fill="#181824"/>

  <!-- Planet surface bands -->
  <path d="M 10 14.6 Q 16 13.5 22 14.6"
    stroke="#252534" stroke-width="2" fill="none"
    stroke-linecap="round" opacity="0.9"/>
  <path d="M 10.5 17.2 Q 16 18 21.5 17.2"
    stroke="#1E1E2E" stroke-width="1.5" fill="none"
    stroke-linecap="round" opacity="0.6"/>

  <!-- Planet highlight shimmer -->
  <circle cx="13.5" cy="13.5" r="2.2" fill="white" fill-opacity="0.035"/>

  <!-- Saturn ring — front half (over planet) -->
  <path d="M 27.5 16 A 11.5 4.2 0 0 1 4.5 16"
    stroke="#FF8A1F" stroke-width="2" fill="none"
    stroke-linecap="round" opacity="0.78"/>

  <!-- Orbiting moon -->
  <circle cx="28.8" cy="16" r="2" fill="#F7C95F" fill-opacity="0.92"/>
  <circle cx="28" cy="15.2" r="0.7" fill="#E5A438" fill-opacity="0.38"/>

  <!-- Stars -->
  <circle cx="5"  cy="7"  r="0.85" fill="white" fill-opacity="0.55"/>
  <circle cx="26" cy="5"  r="0.7"  fill="white" fill-opacity="0.45"/>
  <circle cx="10" cy="4"  r="0.5"  fill="white" fill-opacity="0.3"/>
  <circle cx="4"  cy="25" r="0.65" fill="white" fill-opacity="0.4"/>
  <circle cx="27" cy="27" r="0.55" fill="white" fill-opacity="0.35"/>
  <circle cx="22" cy="28" r="0.4"  fill="#A884FF" fill-opacity="0.5"/>
</svg>
